services:
  - type: web
    name: sprint-tracker-api
    env: node
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sprint-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "5000"

  - type: web
    name: sprint-tracker-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sprint-tracker-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: sprint-tracker-db
    databaseName: sprint_tracker
    user: sprint_user
    plan: free
